data:
  name: cmapss
  processed_dir: data/processed/cmapss
  T: 24

model:
  d_hidden: 64
  ae_layers: 2            # was 1; a slightly deeper GRU AE lowers reconstruction bias
  decoder_type: gru
  decoder_sigmoid: true   # bound decoder output to [0,1] (real data support) -> removes an easy real/fake tell
  # score network: 'unet' (1D U-Net, the paper's proposed architecture -- default, for
  # reproduction fidelity) or 'mlp' (residual MLP + FiLM; an off-paper variant that
  # empirically scored slightly better on C-MAPSS discriminative score, kept as an
  # override -- see docs/reproduction_plan.md comparison notes)
  score_net_type: unet
  mlp_width: 256
  mlp_blocks: 4
  unet_channels: [32, 64, 64, 128]  # depth=4, paper's default (Table 5 depth=3 is a sensitivity variant)
  unet_depth: 4
  d_t: 64

sde:
  type: vp               # validated baseline; try 'subvp' as an override experiment
  beta_min: 0.1
  beta_max: 20
  n_steps_sample: 1000
  n_corrector_steps: 1   # try 2-4 to trade sampling cost for fidelity
  snr: 0.16

train:
  iter_pre: 10000         # was 5000
  iter_main: 40000        # was 20000
  use_alt: false           # tried true (joint AE+score fine-tuning): result was WORSE (discriminative
                            # 0.3618 vs 0.3134) -- the AE overfit/memorized training windows (recon_loss ->
                            # ~3e-6) under joint fine-tuning, degrading the latent manifold's smoothness and
                            # the score net's fit (score_loss rose from 0.085 to 0.11 over training). Reverted.
  ae_noise_std: 0.1       # denoising-AE noise (standardized-latent units); 0 disables
  batch_size: 128
  lr_ae: 0.001
  lr_score: 0.001
  ema_decay: 0.999
  save_every: 5000
  select_best: true       # keep ckpt_best.pt by val discriminative
  select_n_steps: 100     # cheap sampling for selection only (validated: discriminative is insensitive to
                            # n_steps, see the n_steps sweep diagnosis, so this doesn't bias selection)
  select_n_samples: 1460  # was 512; use the full val set -- 512/seed=0 alone was noisy enough to pick a
                            # checkpoint that scored near-zero internally but ~0.31-0.36 under the full protocol
  select_n_seeds: 2       # classifier-training seeds averaged per fake batch
  select_n_fake_batches: 3 # re-samples fake data this many times per selection point (each
                            # draws fresh noise), so selection now averages 3*2=6 (batch, seed)
                            # measurements instead of scoring one static fake batch with multiple
                            # classifier seeds. Fixes the previously-documented gap where the
                            # "best" checkpoint read ~0.002-0.03 internally but ~0.31-0.36 under
                            # the full 10-seed/3736-sample protocol (generation-draw variance was
                            # not captured before). Still a heuristic, just a less noisy one.

eval:
  n_seeds: 10

smoke_test:
  iter_pre: 20
  iter_main: 20
  n_steps_sample: 10
  n_samples: 8
  save_every: 10
